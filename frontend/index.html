<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Lubricentro Eden — Tu tienda de aceites, filtros y repuestos automotor online." />
    <meta name="theme-color" content="#CB1A20" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Lubricentro Eden — Aceites, Filtros y Repuestos</title>
  </head>
  <body>
    <div id="root"></div>

    <!--Start of BeepyChatbot Script-->
    <script type="text/javascript">
    (function(d,s,id){
    if(d.getElementById(id)){return;}
    var u='//www.beepychatbot.com/'+d.domain+'/eye.js?';
    if((h=d.location.href.split(/#ev!/)[1])) u += '?_e=' +h;
    else if((r=/.*\_evV=(\w+)\b.*/).test(c=d.cookie) ) u += '?_v='+c.replace(r,'$1');
    var js = d.createElement(s);
    js.src = u;js.id = id;
    var fjs = d.getElementsByTagName(s)[0];
    fjs.parentNode.insertBefore(js, fjs);
    })(document,'script','livebeep-script');
    </script>
    <!--End of BeepyChatbot Script-->

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
